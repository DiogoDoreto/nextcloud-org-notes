<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Org-mode inspired icon: asterisk heading style -->
  <rect width="32" height="32" rx="6" fill="currentColor" opacity="0.1"/>
  <!-- * heading lines -->
  <text x="3" y="12" font-family="monospace" font-size="9" font-weight="bold" fill="currentColor">*</text>
  <line x1="12" y1="9" x2="29" y2="9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <text x="3" y="20" font-family="monospace" font-size="9" font-weight="bold" fill="currentColor">**</text>
  <line x1="16" y1="17" x2="29" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3" y1="25" x2="29" y2="25" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="3" y1="29" x2="22" y2="29" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
</svg>
